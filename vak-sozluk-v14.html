<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a2f5e">
<title>Vak-Sözlük</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#1a2f5e; --blue:#2563eb; --accent:#f97316;
    --bg:#eef2f7; --white:#fff; --text:#1e293b;
    --muted:#64748b; --light:#f1f5f9; --border:#e2e8f0;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh}

  /* HEADER */
  .header{background:linear-gradient(145deg,#1a2f5e,#2563eb);padding:48px 20px 56px;position:relative;overflow:hidden}
  .header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06)}
  .header::after{content:'';position:absolute;bottom:-30px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04)}
  .header-inner{position:relative;z-index:1}
  .header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .header-label{font-size:10px;font-weight:700;letter-spacing:3px;color:#93c5fd;text-transform:uppercase;margin-bottom:6px}
  .header-title{font-size:30px;font-weight:900;color:#fff;letter-spacing:-1.5px}
  .header-sub{font-size:12px;color:#bfdbfe;margin-top:5px;font-weight:600}
  .hdr-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);border-radius:14px;padding:9px 13px;color:#fff;font-family:'Sora',sans-serif;font-size:12px;font-weight:700;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s;white-space:nowrap}
  .hdr-btn.active{background:#f97316;border-color:#f97316}

  .content{padding:0 16px;margin-top:-28px;padding-bottom:40px}

  /* DAILY CARD */
  .daily-card{background:linear-gradient(135deg,#f97316,#ef4444);border-radius:22px;padding:20px;margin-bottom:10px;box-shadow:0 10px 28px rgba(249,115,22,.35);position:relative;overflow:hidden}
  .daily-card::after{content:'🚌';position:absolute;right:14px;bottom:-4px;font-size:48px;opacity:.12;pointer-events:none}
  .daily-label{font-size:10px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,.7);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
  .daily-counter{font-size:10px;font-weight:700;color:rgba(255,255,255,.5)}
  .daily-nl{font-size:22px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:6px;padding-right:54px;cursor:pointer}
  .daily-tr{font-size:13px;color:rgba(255,255,255,.88);padding-right:54px}
  .daily-actions{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:8px}
  .daily-speak-btn{background:rgba(255,255,255,.2);border:none;border-radius:12px;padding:10px 14px;color:#fff;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Sora',sans-serif;font-size:12px;font-weight:700;transition:all .2s;flex:1}
  .daily-speak-btn:active{transform:scale(.96);background:rgba(255,255,255,.35)}
  .daily-next-btn{background:rgba(255,255,255,.25);border:1.5px solid rgba(255,255,255,.4);border-radius:12px;padding:10px 14px;color:#fff;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Sora',sans-serif;font-size:12px;font-weight:700;transition:all .2s;flex:1;justify-content:center}
  .daily-next-btn:active{transform:scale(.96)}
  .daily-teacher-btn{background:rgba(255,255,255,.2);border:none;border-radius:12px;padding:10px 14px;color:#fff;cursor:pointer;font-family:'Sora',sans-serif;font-size:12px;font-weight:700;transition:all .2s;flex:1;text-align:center}
  .daily-teacher-btn:active{transform:scale(.96)}

  /* DAILY HISTORY */
  .daily-history{background:var(--white);border-radius:16px;padding:14px 16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  .history-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .history-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
  .history-item:last-child{border-bottom:none;padding-bottom:0}
  .history-item:first-child{padding-top:0}
  .history-nl{font-size:13px;font-weight:700;color:var(--text)}
  .history-tr{font-size:11px;color:var(--muted);margin-top:1px}
  .history-speak{background:none;border:none;font-size:16px;cursor:pointer;padding:4px;opacity:.7}

  /* STATS */
  .stats-bar{display:flex;gap:10px;margin-bottom:14px}
  .stat-box{flex:1;background:var(--white);border-radius:14px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .stat-num{font-size:20px;font-weight:900;color:var(--blue)}
  .stat-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

  .ai-banner{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1.5px solid #86efac;border-radius:14px;padding:12px 14px;margin-bottom:14px}
  .ai-dot{width:9px;height:9px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.6);flex-shrink:0;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 6px rgba(34,197,94,.4)}50%{box-shadow:0 0 14px rgba(34,197,94,.8)}}
  .ai-banner-text{font-size:12px;font-weight:700;color:#166534;flex:1}
  .ai-banner-sub{font-size:10px;color:#16a34a;font-weight:600;margin-top:2px}

  /* SEARCH + CATS */
  .search-wrap{position:relative;margin-bottom:12px}
  .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
  .search-input{width:100%;padding:14px 16px 14px 44px;border-radius:16px;border:2px solid var(--border);background:var(--white);font-family:'Sora',sans-serif;font-size:15px;color:var(--text);outline:none;box-shadow:0 2px 10px rgba(0,0,0,.06);transition:border-color .2s}
  .search-input:focus{border-color:var(--blue)}
  .search-input::placeholder{color:#94a3b8}
  .cats{display:flex;overflow-x:auto;gap:8px;padding-bottom:12px;scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  .cat-btn{white-space:nowrap;padding:9px 18px;border-radius:12px;border:none;font-family:'Sora',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;background:var(--white);color:var(--muted);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .cat-btn.active{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.35)}
  .result-count{font-size:12px;color:#94a3b8;font-weight:600;margin-bottom:12px}

  /* CARDS */
  .cards{display:flex;flex-direction:column;gap:10px}
  .card{background:var(--white);border-radius:18px;padding:16px 18px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1.5px solid var(--border);position:relative;animation:fadeUp .3s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .card-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .card-num{font-size:10px;font-weight:700;color:#94a3b8}
  .card-cat{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:6px}
  .card-nl{font-size:18px;font-weight:800;color:#1e293b;line-height:1.4;padding-right:76px;margin-bottom:6px}
  .card-tr{font-size:13px;color:#64748b;padding-right:76px;border-top:1px solid #f1f5f9;padding-top:6px}
  .card-actions{position:absolute;right:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:7px;align-items:center}
  .speak-btn{background:var(--light);border:none;border-radius:12px;padding:10px;cursor:pointer;color:var(--muted);transition:all .2s;display:flex;align-items:center;justify-content:center}
  .speak-btn.playing{background:#dbeafe;color:var(--blue);transform:scale(1.12)}
  .fav-btn{background:transparent;border:none;cursor:pointer;padding:4px;font-size:19px;transition:transform .2s;line-height:1}
  .fav-btn:active{transform:scale(1.3)}
  .teacher-btn{background:transparent;border:none;cursor:pointer;padding:4px;font-size:19px;transition:transform .2s;line-height:1}
  .teacher-btn.open{filter:drop-shadow(0 0 5px #22c55e)}

  /* QUIZ */
  .card.quiz{cursor:pointer}
  .quiz-hint{font-size:11px;color:#cbd5e1;margin-top:8px;font-weight:600}

  /* TEACHER PANEL */
  .teacher-panel{margin-top:14px;background:#fff;border:1.5px solid #bbf7d0;border-radius:16px;overflow:hidden;animation:fadeUp .3s ease both}
  .teacher-tabs{display:flex;border-bottom:1px solid #e2e8f0;background:#f8fafc}
  .teacher-tab{flex:1;padding:10px 6px;font-family:'Sora',sans-serif;font-size:11px;font-weight:700;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;text-align:center}
  .teacher-tab.active{color:#065f46;border-bottom-color:#22c55e;background:#fff}
  .teacher-body{padding:14px}
  .teacher-loading{display:flex;align-items:center;gap:10px;color:#059669;font-size:13px;font-weight:700;padding:16px}
  .loader{width:18px;height:18px;border:2.5px solid #bbf7d0;border-top-color:#059669;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  .teacher-section{display:none;font-size:13px;color:#1e293b;line-height:1.8;white-space:pre-wrap}
  .teacher-section.active{display:block}
  .teacher-error{font-size:12px;color:#dc2626;font-weight:600;line-height:1.6;padding:14px}

  /* TELAFFUZ KARTI */
  .pronun-box{background:#f0fdf4;border-radius:12px;padding:12px 14px;margin-bottom:8px}
  .pronun-word{font-size:16px;font-weight:800;color:#065f46}
  .pronun-read{font-size:13px;color:#16a34a;font-style:italic;margin-top:2px}
  .pronun-tip{font-size:11px;color:#4ade80;margin-top:4px}

  /* KELİME KARTI */
  .word-box{background:#eff6ff;border-radius:12px;padding:10px 14px;margin-bottom:6px}
  .word-nl{font-size:15px;font-weight:800;color:#1e40af}
  .word-tr{font-size:13px;color:#3b82f6;margin-top:2px}
  .word-type{display:inline-block;font-size:10px;font-weight:700;background:#bfdbfe;color:#1e40af;padding:1px 7px;border-radius:6px;margin-top:4px;text-transform:uppercase}

  /* QUIZ ALANI (öğretmen içi) */
  .mini-quiz{background:#fefce8;border:1.5px solid #fde047;border-radius:12px;padding:14px;margin-top:4px}
  .mini-quiz-q{font-size:13px;font-weight:700;color:#854d0e;margin-bottom:10px}
  .mini-quiz-opts button{display:block;width:100%;text-align:left;padding:9px 12px;border-radius:10px;border:1.5px solid #fde047;background:#fff;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px;transition:all .2s;color:#1e293b}
  .mini-quiz-opts button.correct{background:#dcfce7;border-color:#22c55e;color:#065f46}
  .mini-quiz-opts button.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b}
  .mini-quiz-result{font-size:12px;font-weight:700;margin-top:8px}

  .empty{text-align:center;padding:48px 20px;color:var(--muted)}
  .empty-icon{font-size:48px;margin-bottom:12px}
  .empty-text{font-size:15px;font-weight:700;line-height:1.6}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="header-label">🚌 Otobüs Sürücüsü</div>

</div>

    <div class="daily-tr" id="dailyTr"></div>

      <button class="daily-speak-btn" onclick="speakText(document.getElementById('dailyNl').textContent,'daily')">

  <div class="ai-banner">

  <div class="search-wrap">

  </div>
  <div class="cats" id="catButtons"></div>
  <div class="result-count" id="resultCount"></div>
  <div class="cards" id="cardsContainer"></div>
</div>

<div class="toast" id="toast"></div>

// ── STORAGE ──
function loadState() {
  try { favorites = JSON.parse(localStorage.getItem("vak_favorites") || "[]"); } catch { favorites=[]; }
  try { seenHistory = JSON.parse(localStorage.getItem("vak_history") || "[]"); } catch { seenHistory=[]; }
  try {
    const saved = localStorage.getItem("vak_daily_idx");
    const savedDate = localStorage.getItem("vak_daily_date");
    const today = new Date().toDateString();
    if (saved !== null && savedDate === today) {
      currentDailyIdx = parseInt(saved);
    }
  } catch {}
}
function saveState() {
  try { localStorage.setItem("vak_favorites", JSON.stringify(favorites)); } catch {}
  try { localStorage.setItem("vak_history", JSON.stringify(seenHistory)); } catch {}
  try {
    localStorage.setItem("vak_daily_idx", currentDailyIdx);
    localStorage.setItem("vak_daily_date", new Date().toDateString());
  } catch {}
}

// ── GÜNÜN İFADESİ ──
function initDaily() {
  if (currentDailyIdx === -1) {
    const d = new Date();
    currentDailyIdx = (d.getDate() + d.getMonth() * 31 + d.getFullYear()) % DATA.length;
  }
  showDaily(currentDailyIdx);
}

function showDaily(idx) {
  const item = DATA[idx];
  document.getElementById("dailyNl").textContent = item.nl;
  document.getElementById("dailyTr").textContent = item.tr;
  document.getElementById("dailyCounter").textContent = `#${idx+1}`;
  document.getElementById("dailyTeacherWrap").innerHTML = "";
  dailyTeacherData = null;

  // Geçmişe ekle (tekrar yoksa)
  if (!seenHistory.find(h => h.idx === idx)) {
    seenHistory.unshift({ idx, nl: item.nl, tr: item.tr });
    if (seenHistory.length > 30) seenHistory.pop();
    saveState();
  }
  renderHistory();
  document.getElementById("statSeen").textContent = seenHistory.length;
}

function nextDaily() {
  // Henüz görülmemiş rastgele bir ifade seç
  const seenIdxs = new Set(seenHistory.map(h => h.idx));
  const unseen = DATA.map((_,i)=>i).filter(i => !seenIdxs.has(i));
  if (unseen.length > 0) {
    currentDailyIdx = unseen[Math.floor(Math.random() * unseen.length)];
  } else {
    // Hepsini gördüyse tamamen rastgele
    currentDailyIdx = Math.floor(Math.random() * DATA.length);
  }
  saveState();
  showDaily(currentDailyIdx);
  showToast("✨ Yeni ifade!");
}

function renderHistory() {
  const box = document.getElementById("historyBox");
  const list = document.getElementById("historyList");
  if (seenHistory.length <= 1) { box.style.display="none"; return; }
  box.style.display="block";
  // İlk kayıt zaten daily'de gösteriliyor, geri kalanları listele
  list.innerHTML = seenHistory.slice(1, 8).map(h => `
    <div class="history-item" onclick="speakText('${h.nl.replace(/'/g,"\\'")}','h${h.idx}')">
      <div>
        <div class="history-nl">${h.nl}</div>
        <div class="history-tr">${h.tr}</div>
      </div>
      <button class="history-speak" onclick="event.stopPropagation();speakText('${h.nl.replace(/'/g,"\\'")}','h${h.idx}')">🔊</button>
    </div>`).join("");
}

  const wrap = document.getElementById("dailyTeacherWrap");

// ── KART TEACHER ──
async function askTeacher(idx) {
  const panelId = `tp-${idx}`;
  const card = document.querySelector(`[data-cardidx="${idx}"]`);
  const btn = card ? card.querySelector(".teacher-btn") : null;
  if (teacherOpen.has(idx)) {
    teacherOpen.delete(idx);
    const p = document.getElementById(panelId);
    if (p) p.remove();
    if (btn) btn.classList.remove("open");
    return;
  }
  teacherOpen.add(idx);
  if (btn) btn.classList.add("open");
  let panel = document.getElementById(panelId);
  if (!panel) { panel = document.createElement("div"); panel.id = panelId; if(card) card.appendChild(panel); }

  if (teacherCache[idx]) {
    panel.outerHTML = buildTeacherPanel(idx, DATA[idx], teacherCache[idx]);
    activateTab(idx, "telaffuz");
    return;
  }
  panel.innerHTML = `<div class="teacher-panel"><div class="teacher-loading"><div class="loader"></div>Analiz ediliyor...</div></div>`;
  const result = await fetchTeacher(DATA[idx]);
  if (result.error) {
    panel.innerHTML = `<div class="teacher-panel"><div class="teacher-error">❌ ${escHtml(result.error)}</div></div>`;
    teacherOpen.delete(idx); if(btn) btn.classList.remove("open");
  } else {
    teacherCache[idx] = result;
    panel.outerHTML = buildTeacherPanel(idx, DATA[idx], result);
    activateTab(idx, "telaffuz");
  }
}

// ── GEMINI API ──
async function fetchTeacher(item) {
  const prompt = `You are a Dutch language teacher. Analyze this Dutch phrase for a Turkish-speaking student.
Respond with ONLY a JSON object, no markdown, no explanation.

Dutch phrase: "${item.nl}"
Turkish meaning: "${item.tr}"

JSON structure (property names must be exactly as shown, values in Turkish):
{
  "telaffuz": [{"kelime": "word", "okuyus": "how to pronounce using Turkish letters", "ipucu": "pronunciation tip"}],
  "kelimeler": [{"nl": "word", "tr": "Turkish meaning", "tur": "word type in Turkish"}],
  "dilbilgisi": "Explain grammar in Turkish: sentence structure, verb conjugation, formal vs informal (u/uw vs jij), word order. 3-5 sentences.",
  "kullanim": "When and how to use this phrase. Stress and tone. 2-3 sentences in Turkish.",
  "alternatifler": ["alternative phrase 1 in Dutch", "alternative phrase 2 in Dutch"],
  "hata": "Most common mistake Turkish speakers make with this phrase, explained in Turkish.",
  "quiz": [{"soru": "quiz question in Turkish", "dogru": "correct answer", "yanlis": ["wrong answer 1", "wrong answer 2"]}]
}`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_API_KEY}`,
      {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          contents:[{parts:[{text:prompt}]}],
          generationConfig:{ maxOutputTokens:900, temperature:0.2 }
        })
      }
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    if (!raw) throw new Error("Gemini boş yanıt döndü");

    // Direkt { ile } arasını al — en güvenilir yöntem
    const start = raw.indexOf("{");
    const end   = raw.lastIndexOf("}");
    if (start === -1 || end === -1) throw new Error("JSON bulunamadı");

    const jsonStr = raw.slice(start, end + 1);
    return JSON.parse(jsonStr);

  } catch(e) {
    // Detaylı hata mesajı
    const msg = e.message.includes("fetch")
      ? "İnternet bağlantısı yok veya API erişilemiyor"
      : e.message;
    return { error: msg };
  }
}

// ── TEACHER PANEL HTML ──
function buildTeacherPanel(id, item, d) {
  const tabs = ["telaffuz","kelimeler","dilbilgisi","quiz"];
  const tabLabels = {"telaffuz":"🔤 Telaffuz","kelimeler":"📖 Kelimeler","dilbilgisi":"🏗️ Dilbilgisi","quiz":"📝 Test"};

  const telaffuzHtml = (d.telaffuz||[]).map(t=>`
    <div class="pronun-box">
      <div class="pronun-word">${escHtml(t.kelime)}</div>
      <div class="pronun-read">→ "${escHtml(t.okuyus || t.okunuş || '')}"</div>
      ${t.ipucu?`<div class="pronun-tip">💡 ${escHtml(t.ipucu)}</div>`:''}
    </div>`).join("");

  const kelimelerHtml = (d.kelimeler||[]).map(k=>`
    <div class="word-box">
      <div class="word-nl">${escHtml(k.nl)}</div>
      <div class="word-tr">${escHtml(k.tr)}</div>

  const dilbilgisiHtml = `
    <div style="font-size:13px;line-height:1.8;color:#1e293b;margin-bottom:12px">${escHtml(d.dilbilgisi||'')}</div>
    ${d.kullanim?`<div style="background:#eff6ff;border-radius:10px;padding:12px;font-size:13px;color:#1e40af;line-height:1.7;margin-bottom:10px">💡 ${escHtml(d.kullanim)}</div>`:''}
    ${d.alternatifler&&d.alternatifler.length?`<div style="font-size:11px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">🔄 Alternatifler</div>${d.alternatifler.map(a=>`<div style="background:#f1f5f9;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;color:#334155;margin-bottom:4px">${escHtml(a)}</div>`).join('')}`:''}
    ${d.hata?`<div style="background:#fee2e2;border-radius:10px;padding:12px;font-size:12px;color:#991b1b;font-weight:600;margin-top:8px">⚠️ ${escHtml(d.hata)}</div>`:''}`;

  const quizItem = d.quiz && d.quiz[0];
  const quizHtml = quizItem ? buildMiniQuiz(id, quizItem) : `<div style="font-size:13px;color:#94a3b8;text-align:center;padding:20px">Test sorusu oluşturulamadı.</div>`;

  const tabContents = {telaffuz:telaffuzHtml, kelimeler:kelimelerHtml, dilbilgisi:dilbilgisiHtml, quiz:quizHtml};

  const panelId = id === "daily" ? "daily-teacher-panel" : `tp-${id}`;
  const wrapStyle = id === "daily" ? 'style="margin-bottom:14px"' : '';

  return `<div class="teacher-panel" id="${panelId}" ${wrapStyle}>
    <div class="teacher-tabs">
      ${tabs.map(t=>`<button class="teacher-tab" id="tab-${id}-${t}" onclick="activateTab('${id}','${t}')">${tabLabels[t]}</button>`).join("")}
    </div>
    <div class="teacher-body">
      ${tabs.map(t=>`<div class="teacher-section" id="sec-${id}-${t}">${tabContents[t]}</div>`).join("")}
    </div>
  </div>`;
}

function activateTab(id, tab) {
  ["telaffuz","kelimeler","dilbilgisi","quiz"].forEach(t => {
    const tabEl = document.getElementById(`tab-${id}-${t}`);
    const secEl = document.getElementById(`sec-${id}-${t}`);
    if(tabEl) tabEl.classList.toggle("active", t===tab);
    if(secEl) secEl.classList.toggle("active", t===tab);
  });
}

// ── MİNİ QUIZ ──
function buildMiniQuiz(id, q) {
  const opts = [q.dogru, ...q.yanlis].sort(()=>Math.random()-.5);
  return `<div class="mini-quiz">
    <div class="mini-quiz-q">${escHtml(q.soru)}</div>
    <div class="mini-quiz-opts" id="quiz-opts-${id}">
      ${opts.map(o=>`<button onclick="checkQuiz('${id}','${escHtml(o).replace(/'/g,"\\'")}','${escHtml(q.dogru).replace(/'/g,"\\'")}',this)">${escHtml(o)}</button>`).join("")}
    </div>
    <div class="mini-quiz-result" id="quiz-result-${id}"></div>
  </div>`;
}

function checkQuiz(id, selected, correct, btn) {
  const opts = document.getElementById(`quiz-opts-${id}`);
  const result = document.getElementById(`quiz-result-${id}`);
  if (!opts || opts.dataset.answered) return;
  opts.dataset.answered = "1";
  opts.querySelectorAll("button").forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add("correct");
  });
  if (selected === correct) {
    result.textContent = "✅ Doğru!"; result.style.color = "#065f46";
  } else {
    btn.classList.add("wrong");
    result.textContent = `❌ Yanlış. Doğru: "${correct}"`; result.style.color = "#991b1b";
  }
}

// ── SES — Hollandaca TTS ──
let speaking = false;

function speakText(text, key) {
  const btn = key ? document.querySelector(`[data-speak="${key}"]`) : null;

  if (!window.speechSynthesis) {
    showToast("⚠️ Tarayıcı ses desteği yok");
    return;
  }

  // Zaten çalışıyorsa durdur
  if (speaking) {
    window.speechSynthesis.cancel();
    speaking = false;
    if (btn) btn.classList.remove("playing");
    return;
  }

  window.speechSynthesis.cancel();

  const ut = new SpeechSynthesisUtterance(text);
  ut.lang = "nl-NL";
  ut.rate = 0.78;
  ut.pitch = 1.05;

  // En iyi Hollandaca sesi seç
  const voices = window.speechSynthesis.getVoices();
  const preferred = [
    voices.find(v => v.lang === "nl-NL" && v.name.includes("Google")),
    voices.find(v => v.lang === "nl-NL" && !v.localService),
    voices.find(v => v.lang === "nl-NL"),
    voices.find(v => v.lang === "nl-BE"),
    voices.find(v => v.lang.startsWith("nl")),
  ].find(Boolean);

  if (preferred) {
    ut.voice = preferred;
  } else {
    // Hollandaca ses yoksa kullanıcıya bildir
    showToast("📱 Ayarlar → Dil → Hollandaca sesi yükle");
  }

  ut.onstart  = () => { speaking = true;  if (btn) btn.classList.add("playing"); };
  ut.onend    = () => { speaking = false; if (btn) btn.classList.remove("playing"); };
  ut.onerror  = () => { speaking = false; if (btn) btn.classList.remove("playing"); };

  window.speechSynthesis.speak(ut);
}

// Sayfa yüklenince sesleri ön yükle
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

// ── KARTLAR ──
function renderCards() {
  teacherOpen = new Set(); teacherCache = {};
  const search = document.getElementById("searchInput").value.toLowerCase();
  const container = document.getElementById("cardsContainer");
  const filtered = DATA.map((d,i)=>({...d,idx:i})).filter(item=>{
    const m = !search || item.nl.toLowerCase().includes(search) || item.tr.toLowerCase().includes(search);
    const c = currentCat==="Hepsi"?true:currentCat==="Favoriler"?favorites.includes(item.nl):item.cat===currentCat;
    return m && c;
  });
  document.getElementById("resultCount").textContent = `${filtered.length} ifade`;
  if (!filtered.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">${currentCat==="Favoriler"?"⭐":"🔍"}</div><div class="empty-text">${currentCat==="Favoriler"?"Henüz favori eklemedin.":"Sonuç bulunamadı."}</div></div>`;
    return;
  }
  container.innerHTML = filtered.map((item,i)=>{
    const colors = CAT_COLORS[item.cat]||{bg:"#f1f5f9",text:"#334155"};
    const isFav = favorites.includes(item.nl);
    const sk = `c-${item.idx}`;
    const nlE = item.nl.replace(/'/g,"\\'");
    const content = quizMode
      ? `<div class="card-nl" style="padding-right:0">${item.nl}</div><div class="quiz-hint">Türkçeyi görmek için tıkla →</div>`
      : `<div class="card-nl">${item.nl}</div><div class="card-tr">${item.tr}</div>`;
    return `
      <div class="card${quizMode?' quiz':''}" data-cardidx="${item.idx}" onclick="${quizMode?`toggleQuizCard(${item.idx})`:''}" style="animation-delay:${Math.min(i*.025,.25)}s">
        <div class="card-meta">
          <span class="card-num">#${item.idx+1}</span>
          <span class="card-cat" style="background:${colors.bg};color:${colors.text}">${item.cat}</span>
        </div>
        <div data-cardcontent="${item.idx}">${content}</div>
        <div class="card-actions">
          <button class="speak-btn" data-speak="${sk}" onclick="event.stopPropagation();speakText('${nlE}','${sk}')" title="Sesli oku">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
          </button>
          <button class="fav-btn" data-nl="${item.nl.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();toggleFav(this.dataset.nl)">${isFav?"⭐":"☆"}</button>
          <button class="teacher-btn" onclick="event.stopPropagation();askTeacher(${item.idx})" title="Gramer analizi">🎓</button>
        </div>
      </div>`;
  }).join("");
}

function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2200)}

// ── INIT ──
loadState();
initDaily();
initCategories();
renderCards();
document.getElementById("statTotal").textContent = DATA.length;
document.getElementById("statFavs").textContent = favorites.length;
document.getElementById("statSeen").textContent = seenHistory.length;
</script>
